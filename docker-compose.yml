services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: customer-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customer_ai
    ports:
      # 本机可能已有 PostgreSQL 占用 5432，固定使用 5433 确保应用连接的是 Docker 数据库。
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: customer-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
